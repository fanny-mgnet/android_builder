        # Create MainActivity.java if missing
        if [ ! -f "app/src/main/java/com/example/priya/MainActivity.java" ]; then
          mkdir -p app/src/main/java/com/example/priya
          cat > app/src/main/java/com/example/priya/MainActivity.java << 'EOF'
package com.example.priya;

import android.os.Bundle;
import android.widget.TextView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        
        TextView textView = new TextView(this);
        textView.setText("Priya AI Call Assistant\n\nYour AI call answering app is ready!");
        textView.setTextSize(20);
        textView.setPadding(50, 50, 50, 50);
        textView.setGravity(android.view.Gravity.CENTER);
        
        setContentView(textView);
    }
}
EOF
          echo "Created MainActivity.java"
