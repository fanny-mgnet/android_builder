        # Create local.properties for Android SDK
        echo "sdk.dir=$ANDROID_HOME" > local.properties 2>/dev/null || echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
        
        echo "Project structure created successfully"
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: List project structure (for debugging)
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== App folder ==="
        ls -la app/ 2>/dev/null || echo "app folder not found"
        echo "=== Build files ==="
        find . -name "*.gradle" -type f
        echo "=== Java files ==="
        find . -name "*.java" -type f
    
    - name: Build APK
      run: |
        gradle assembleDebug --no-daemon --stacktrace
    
    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          **/build/outputs/apk/debug/*.apk
        if-no-files-found: error
